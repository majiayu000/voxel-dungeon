<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Roguelike 地牢探险</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- 准星 -->
    <div id="crosshair" class="hidden"></div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div class="hud-top-left">
        <canvas id="hud-hearts" width="314" height="36"></canvas>
        <div id="hud-stats"></div>
      </div>
      <div class="hud-top-right" id="hud-right"></div>
      <canvas id="hud-xp" width="380" height="34"></canvas>
      <div class="hud-hint">WASD 移动 · Space 闪避 · 鼠标左键攻击 · Esc 暂停</div>
    </div>

    <!-- 小地图（P4） -->
    <canvas id="minimap" class="hidden" width="168" height="168"></canvas>

    <!-- 敌人血条覆盖层 -->
    <canvas id="enemy-bars" class="hidden"></canvas>

    <!-- 飘伤害数字 -->
    <canvas id="damage-numbers" class="hidden"></canvas>

    <!-- 受击红屏 -->
    <div id="damage-flash" class="hidden"></div>

    <!-- 主菜单 -->
    <div id="menu" class="overlay">
      <h1 id="loading-title" class="loading-title">地牢探险</h1>
      <canvas id="title-logo" class="title-logo" aria-hidden="true" hidden></canvas>
      <p class="menu-sub">随机生成的地牢，越深越危险。搜刮、战斗、想办法活下去。</p>
      <p id="loading-status" class="loading-status" role="status" aria-live="polite">正在载入地牢…</p>
      <button id="continue-btn" class="hidden" disabled>继续上局</button>
      <button id="start-btn" disabled>开始新游戏</button>
      <p id="menu-meta" class="menu-meta"></p>
      <p class="menu-hint">WASD 移动 · Space 闪避 · 鼠标视角 · 左键攻击 · Esc 暂停 · M 静音</p>
    </div>

    <!-- 暂停 -->
    <div id="pause" class="overlay hidden">
      <h1>已暂停</h1>
      <p style="font-size: 14px; color: #a898c0">点击任意处继续（鼠标将重新锁定）</p>
      <button id="resume-btn">继续</button>
    </div>

    <!-- 死亡结算（P3） -->
    <div id="death" class="overlay hidden">
      <h1>你死了</h1>
      <p id="death-summary"></p>
      <button id="restart-btn">再来一局</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
